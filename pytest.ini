[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require test workspaces)
    premium: Premium feature tests (may fail based on plan)
    slow: Slow-running tests

# Coverage settings
addopts =
    --verbose
    --color=yes
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --cov-fail-under=90

# Test output
console_output_style = progress

# Timeout settings (seconds)
timeout = 300

# Asyncio settings
asyncio_mode = auto

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git __pycache__ *.egg-info build dist

# Coverage exclusions
[coverage:run]
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod





